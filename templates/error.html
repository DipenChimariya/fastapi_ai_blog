{% extends "base.html" %}

{% block title %}Error {{ status_code }}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4">
    <div class="w-full max-w-lg bg-white dark:bg-slate-800 p-8 md:p-12 rounded-3xl shadow-2xl border border-gray-100 dark:border-slate-700 text-center">
        
        <div class="inline-block px-4 py-1 mb-6 rounded-full bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 text-sm font-bold tracking-widest uppercase">
            {{ status_code }} Error
        </div>

        <h2 class="text-4xl font-extrabold mb-4 text-slate-900 dark:text-white">
            Oops! Page Not Found
        </h2>
        
        <p class="text-lg text-slate-600 dark:text-slate-400 mb-10 leading-relaxed">
            We couldn't find the post or page you were looking for. <br>
            <span class="text-sm font-mono opacity-60">({{ message }})</span>
        </p>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <a href="{{ url_for('home') }}" 
               class="px-8 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-600/20">
                Back to Home
            </a>
            
            <button onclick="history.back()" 
                    class="px-8 py-3 border-2 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
