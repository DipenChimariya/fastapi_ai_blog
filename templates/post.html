{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article class="max-w-3xl mx-auto bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden">
    <div class="p-8">
        <div class="flex items-center gap-4 mb-6 pb-6 border-b border-gray-100 dark:border-slate-700">
            <img src="https://ui-avatars.com/api/?name={{ post.author }}&background=random" 
                 class="h-12 w-12 rounded-full shadow-sm" alt="author">
            <div>
                <a href="#" class="block font-bold text-emerald-600 dark:text-emerald-400 hover:underline">
                    {{ post.author }}
                </a>
                <span class="text-sm text-gray-500">{{ post.date_posted }}</span>
            </div>
            
            <div class="ml-auto">
                <span class="text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400">
                    {{ post.category }}
                </span>
            </div>
        </div>

        <h2 class="text-3xl font-extrabold mb-4 dark:text-white leading-tight">
            {{ post.title }}
        </h2>
        <p class="text-gray-600 dark:text-slate-300 leading-relaxed text-lg mb-8">
            {{ post.content }}
        </p>

        <div class="flex items-center gap-3 pt-6 border-t border-gray-100 dark:border-slate-700">
            <a href="#" class="px-4 py-2 text-sm font-medium border border-gray-300 dark:border-slate-600 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-700 transition">
                Edit Post
            </a>
            <button class="px-4 py-2 text-sm font-medium text-red-600 border border-red-200 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                Delete Post
            </button>
        </div>
    </div>
</article>
{% endblock %}
