<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <nav class="bg-white shadow-sm border-b border-slate-200 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-emerald-600">FastAPI AI Blog</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-emerald-500 transition">Home</a>
                <a href="#" class="hover:text-emerald-500 transition">About</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto mt-10 px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
