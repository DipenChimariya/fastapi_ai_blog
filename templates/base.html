<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Blog - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 1. TELL TAILWIND TO USE THE CLASS STRATEGY
        tailwind.config = {
            darkMode: 'class',
        }

        // 2. APPLY THE THEME IMMEDIATELY ON LOAD
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }

        // 3. THE TOGGLE FUNCTION
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <nav class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-slate-700 p-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-600 dark:text-emerald-400">FastAPI AI Blog</h1>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 dark:bg-slate-700 hover:ring-2 ring-emerald-400 transition-all">
                <span class="dark:hidden">🌙</span>
                <span class="hidden dark:inline">☀️</span>
            </button>

            <div class="flex items-center gap-3 border-l pl-4 border-gray-200 dark:border-slate-700">
                <a href="#" class="text-sm font-medium hover:text-emerald-500 transition">Login</a>
                <a href="#" class="text-sm bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition shadow-sm">Register</a>
                
                <div class="h-9 w-9 rounded-full bg-gradient-to-tr from-emerald-400 to-blue-500 p-0.5 cursor-pointer hover:opacity-80 transition">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" class="h-full w-full rounded-full border-2 border-white dark:border-slate-800 object-cover" alt="PP">
                </div>
            </div>
        </div>
    </div>
</nav>

    <main class="max-w-5xl mx-auto mt-10 px-4">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
