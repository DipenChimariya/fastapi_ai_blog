{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <div class="mb-10 text-center md:text-left">
        <h2 class="text-4xl font-extrabold tracking-tight">Recent Posts</h2>
        <p class="text-gray-500 dark:text-slate-400 mt-2">Welcome to my 60-day backend journey.</p>
    </div>

    <div class="grid gap-8 md:grid-cols-2">
        {% for post in posts %}
        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
            <h3 class="text-2xl font-bold mb-3 dark:text-white">{{ post.title }}</h3>
            <p class="text-gray-600 dark:text-slate-300 leading-relaxed mb-6">{{ post.content }}</p>
            
            <div class="flex items-center justify-between mt-auto">
                <span class="text-sm font-medium text-emerald-600 dark:text-emerald-400">By {{ post.author }}</span>
                <span class="text-xs text-gray-400">{{ post.date_posted }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
