{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <div class="mb-10 text-center md:text-left">
        <h2 class="text-4xl font-extrabold tracking-tight">Recent Posts</h2>
        <p class="text-gray-500 dark:text-slate-400 mt-2">Welcome to my 60-day backend journey.</p>
    </div>

    <div class="grid gap-8 md:grid-cols-2">
        {% for post in posts %}
        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col">
            
            <div class="mb-4">
                <span class="text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400">
                    {{ post.category }}
                </span>
            </div>

            <h3 class="text-2xl font-bold mt-4 mb-3">
            <a href="{{ url_for('post_detail', post_id=post.id) }}" class="hover:text-emerald-500 transition">
            {{ post.title }}
            </a>
            </h3>
            <p class="text-gray-600 dark:text-slate-300 leading-relaxed mb-6">{{ post.content }}</p>
            
            <div class="flex items-center justify-between mt-auto pt-6 border-t border-gray-100 dark:border-slate-700">
                <div class="flex items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name={{ post.author }}&background=random" class="h-8 w-8 rounded-full" alt="author">
                    <span class="text-sm font-semibold text-gray-700 dark:text-slate-200">{{ post.author }}</span>
                </div>
                <span class="text-xs text-gray-400">{{ post.date_posted }}</span>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
